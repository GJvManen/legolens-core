name: Validate LegoLens

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate v3.0.0 release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check v3 frontend
        run: node --check app_v3.js

      - name: Syntax check compat
        run: node --check compat.js

      - name: Syntax check backend
        run: node --check backend/server.mjs

      - name: Validate v3 static release
        run: npm test

      - name: Browser smoke test
        run: npm run browser:smoke

      - name: Release gate
        run: npm run release:check

      - name: Ingestion run-all framework test
        run: npm run ingestion:run-all
