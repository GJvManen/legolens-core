name: Validate LegoLens

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build bootstrap and checksums
        run: npm run build
      - name: Validate release metadata
        run: npm run validate
      - name: Run test suite
        run: npm test
