openapi: 3.1.0
info:
  title: LegoLens Action API
  version: 1.0.0
  description: Candidate-only API for querying LegoLens release status, case packs and AI suggestions.
servers:
  - url: https://YOUR_PUBLIC_LEGOLENS_BACKEND.example.org
paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Get LegoLens backend health
      responses:
        '200': { description: OK }
  /api/version:
    get:
      operationId: getVersion
      summary: Get current LegoLens version
      responses:
        '200': { description: OK }
  /api/release/manifest:
    get:
      operationId: getReleaseManifest
      summary: Get release manifest
      responses:
        '200': { description: OK }
  /api/ai/discover:
    post:
      operationId: suggestDiscoveryCandidates
      summary: Suggest candidates only; never publish directly
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                max_candidates: { type: integer, minimum: 1, maximum: 25 }
                scope: { type: string }
      responses:
        '200': { description: Candidate suggestions }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-LegoLens-API-Key
security:
  - ApiKeyAuth: []
