<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#07111d"/>
  <rect x="55" y="45" width="1090" height="670" rx="28" fill="#0b1724" stroke="#1f3b52"/>
  <text x="95" y="105" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Ingestion &amp; External Connections</text>
  <text x="95" y="137" fill="#9fb6c3" font-family="Arial, sans-serif" font-size="17">Connector configuration, source health and backend-only external integrations.</text>

  <g font-family="Arial, sans-serif">
    <rect x="95" y="190" width="310" height="230" rx="18" fill="#102235" stroke="#2dd4bf"/>
    <text x="125" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Connector Registry</text>
    <text x="125" y="280" fill="#9fb6c3" font-size="16">RSS • JSON • CSV</text>
    <text x="125" y="310" fill="#9fb6c3" font-size="16">Manual URL • Archive</text>
    <text x="125" y="350" fill="#31d0aa" font-size="16" font-weight="700">candidate-only output</text>

    <rect x="455" y="190" width="310" height="230" rx="18" fill="#102235" stroke="#315f7a"/>
    <text x="485" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Source Health</text>
    <text x="485" y="280" fill="#9fb6c3" font-size="15">Approval rate</text>
    <rect x="485" y="295" width="230" height="12" rx="6" fill="#172b3d"/>
    <rect x="485" y="295" width="166" height="12" rx="6" fill="#31d0aa"/>
    <text x="485" y="340" fill="#9fb6c3" font-size="15">Duplicate rate</text>
    <rect x="485" y="355" width="230" height="12" rx="6" fill="#172b3d"/>
    <rect x="485" y="355" width="42" height="12" rx="6" fill="#60a5fa"/>

    <rect x="815" y="190" width="290" height="230" rx="18" fill="#102235" stroke="#315f7a"/>
    <text x="845" y="235" fill="#e6f7ff" font-size="22" font-weight="700">External Connections</text>
    <text x="845" y="280" fill="#9fb6c3" font-size="15">ChatGPT / OpenAI</text>
    <text x="845" y="306" fill="#9fb6c3" font-size="15">MISP server</text>
    <text x="845" y="332" fill="#9fb6c3" font-size="15">TAXII server</text>
    <text x="845" y="358" fill="#9fb6c3" font-size="15">STIX file exchange</text>

    <rect x="95" y="475" width="1010" height="115" rx="18" fill="#0d1b2a" stroke="#24465f"/>
    <text x="125" y="520" fill="#e6f7ff" font-size="20" font-weight="700">Security rule</text>
    <text x="125" y="562" fill="#9fb6c3" font-size="18">No secrets in frontend code. Live MISP/TAXII/OpenAI credentials belong in backend runtime configuration only.</text>
  </g>
</svg>
