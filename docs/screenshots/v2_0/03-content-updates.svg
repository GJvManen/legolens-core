<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#07111d"/><rect x="55" y="45" width="1090" height="670" rx="28" fill="#0b1724" stroke="#1f3b52"/><text x="95" y="105" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">Content Update Center</text><text x="95" y="137" fill="#9fb6c3" font-family="Arial" font-size="17">Candidate-only update flow with normalization, deduplication and review.</text><g font-family="Arial"><rect x="95" y="190" width="310" height="210" rx="18" fill="#102235" stroke="#2dd4bf"/><text x="125" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Check new content</text><text x="125" y="280" fill="#31d0aa" font-size="30" font-weight="700">candidate-only</text><text x="125" y="325" fill="#9fb6c3" font-size="15">No automatic publication</text><rect x="455" y="190" width="310" height="210" rx="18" fill="#102235" stroke="#315f7a"/><text x="485" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Transaction model</text><text x="485" y="278" fill="#9fb6c3" font-size="16">1. Normalize</text><text x="485" y="306" fill="#9fb6c3" font-size="16">2. Deduplicate</text><text x="485" y="334" fill="#9fb6c3" font-size="16">3. Policy check</text><rect x="815" y="190" width="290" height="210" rx="18" fill="#102235" stroke="#315f7a"/><text x="845" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Review queue</text><text x="845" y="280" fill="#60a5fa" font-size="38" font-weight="700">needs review</text><text x="845" y="325" fill="#9fb6c3" font-size="15">Approve, reject or mark duplicate</text><rect x="95" y="460" width="1010" height="125" rx="18" fill="#0d1b2a" stroke="#24465f"/><text x="125" y="505" fill="#e6f7ff" font-size="20" font-weight="700">Flow</text><text x="125" y="550" fill="#9fb6c3" font-size="18">check update → normalize → deduplicate → policy check → import as candidates → analyst review → approved content</text></g></svg>