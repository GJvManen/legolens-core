<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760"><rect width="1200" height="760" fill="#07111d"/><rect x="55" y="45" width="1090" height="670" rx="28" fill="#0b1724" stroke="#1f3b52"/><text x="95" y="105" fill="#f8fafc" font-family="Arial" font-size="34" font-weight="700">Exchange Center</text><text x="95" y="137" fill="#9fb6c3" font-family="Arial" font-size="17">Controlled exchange with STIX/TAXII/MISP and other open standards.</text><g font-family="Arial"><rect x="95" y="190" width="310" height="230" rx="18" fill="#102235" stroke="#2dd4bf"/><text x="125" y="235" fill="#e6f7ff" font-size="22" font-weight="700">STIX / TAXII / MISP</text><text x="125" y="282" fill="#31d0aa" font-size="18" font-weight="700">STIX 2.1</text><text x="125" y="314" fill="#60a5fa" font-size="18" font-weight="700">TAXII 2.1</text><text x="125" y="346" fill="#fbbf24" font-size="18" font-weight="700">MISP Event JSON/API</text><rect x="455" y="190" width="310" height="230" rx="18" fill="#102235" stroke="#315f7a"/><text x="485" y="235" fill="#e6f7ff" font-size="22" font-weight="700">Sharing policy</text><text x="485" y="280" fill="#9fb6c3" font-size="16">internal_only</text><text x="485" y="310" fill="#9fb6c3" font-size="16">share_review_required</text><text x="485" y="340" fill="#9fb6c3" font-size="16">share_approved</text><text x="485" y="370" fill="#9fb6c3" font-size="16">shared / retracted</text><rect x="815" y="190" width="290" height="230" rx="18" fill="#102235" stroke="#315f7a"/><text x="845" y="235" fill="#e6f7ff" font-size="22" font-weight="700">More standards</text><text x="845" y="280" fill="#9fb6c3" font-size="15">CACAO • OpenC2</text><text x="845" y="306" fill="#9fb6c3" font-size="15">Sigma • YARA</text><text x="845" y="332" fill="#9fb6c3" font-size="15">CSAF • OSCAL • OCSF</text><text x="845" y="358" fill="#9fb6c3" font-size="15">OpenAPI • GeoJSON</text><rect x="95" y="475" width="1010" height="115" rx="18" fill="#0d1b2a" stroke="#24465f"/><text x="125" y="520" fill="#e6f7ff" font-size="20" font-weight="700">Key rule</text><text x="125" y="562" fill="#9fb6c3" font-size="18">Reviewed does not mean share-approved. Imported partner data returns as candidates first.</text></g></svg>