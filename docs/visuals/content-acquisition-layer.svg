<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 675' role='img' aria-labelledby='title desc'><title id='title'>Content acquisition layer</title><desc id='desc'>Architecture overview showing inbound sources, registries, candidate queue, processing engines, review, promotion and audit logging.</desc><defs><marker id='arrow' markerWidth='9' markerHeight='9' refX='8' refY='4.5' orient='auto'><path d='M0,0 L9,4.5 L0,9 Z' fill='#64748b'/></marker><filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'><feDropShadow dx='0' dy='8' stdDeviation='10' flood-color='#0f172a' flood-opacity='.07'/></filter></defs><style>.bg{fill:#fbfdff}.title{font:700 44px Arial,sans-serif;fill:#0f172a;letter-spacing:-1.2px}.subtitle{font:400 20px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;filter:url(#shadow)}.panelB{fill:#fff;stroke:#2563eb;stroke-width:1.8;filter:url(#shadow)}.panelT{fill:#fff;stroke:#0f766e;stroke-width:1.8;filter:url(#shadow)}.hB{font:700 18px Arial,sans-serif;fill:#1d4ed8}.hT{font:700 18px Arial,sans-serif;fill:#0f766e}.label{font:500 13px Arial,sans-serif;fill:#0f172a}.small{font:400 11.5px Arial,sans-serif;fill:#334155}.tiny{font:400 10.5px Arial,sans-serif;fill:#475569}.pill{fill:#f8fbff;stroke:#d8e4f5}.pillT{fill:#f0fdfa;stroke:#ccfbf1}.line{stroke:#64748b;stroke-width:1.8;marker-end:url(#arrow)}.dash{stroke:#2563eb;stroke-width:1.4;stroke-dasharray:5 6}.dashT{stroke:#0f766e;stroke-width:1.4;stroke-dasharray:5 6}.iconB{stroke:#2563eb;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}.iconT{stroke:#0f766e;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}</style><rect class='bg' width='1200' height='675'/><g transform='translate(44 42)'><path d='M0 20 L34 0 L68 20 L34 40 Z' fill='#2563eb'/><path d='M0 20 L34 40 L34 78 L0 58 Z' fill='#0f766e'/><path d='M68 20 L34 40 L34 78 L68 58 Z' fill='#0e7490'/><circle cx='20' cy='19' r='5' fill='#93c5fd'/><circle cx='34' cy='11' r='5' fill='