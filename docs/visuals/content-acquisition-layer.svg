text x='46' y='112' text-anchor='middle' class='hB' style='font-size:13px'><tspan x='46'>Review</tspan><tspan x='46' dy='15'>Workbench</tspan></text><text x='46' y='143' text-anchor='middle' class='tiny'><tspan x='46'>Analysts assess</tspan><tspan x='46' dy='12'>and decide</tspan></text></g><line class='line' x1='583' y1='90' x2='606' y2='90'/><g transform='translate(610 0)'><rect class='panel' width='92' height='180' rx='14'/><path class='iconT' d='M24 70l50-26-14 55-15-20-21-9z'/><text x='46' y='112' text-anchor='middle' class='hT' style='font-size:13px'><tspan x='46'>Promotion</tspan><tspan x='46' dy='15'>Engine</tspan></text><text x='46' y='143' text-anchor='middle' class='tiny'><tspan x='46'>Moves approved</tspan><tspan x='46' dy='12'>items</tspan></text></g></g><line class='line' x1='485' y1='375' x2='514' y2='375'/><line class='line' x1='1123' y1='370' x2='1145' y2='370'/><rect class='panelT' x='1148' y='295' width='100' height='170' rx='16'/><circle cx='1198' cy='350' r='30' fill='none' stroke='#0f766e' stroke-width='4'/><path d='M1183 350l10 10 23-25' fill='none' stroke='#0f766e' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/><text x='1198' y='405' text-anchor='middle' class='hT'><tspan x='1198'>Approved</tspan><tspan x='1198' dy='20'>content</tspan></text><text x='1198' y='440' text-anchor='middle' class='tiny'><tspan x='1198'>Ready for use</tspan><tspan x='1198' dy='12'>across framework</tspan></text><rect class='panelT' x='910' y='152' width='205' height='62' rx='12'/><circle cx='943' cy='183' r='17' fill='none' stroke='#0f766e' stroke-width='2.5'/><text x='943' y='190' text-anchor='middle' class='hT'>i</text><text x='979' y='175' class='label'><tspan x='979'>Promotion happens</tspan><tspan x='979' dy='16'>only after analyst review</tspan></text><path class='dashT' d='M1012 214v60'/><rect x='240' y='565' width='920' height='70' rx='14' fill='#f8fbff' stroke='#2563eb' stroke-width='1.4'/><path class='iconB' d='M420 590h34v30h-34zM431 585